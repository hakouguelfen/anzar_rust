# =============================================================================
# Database Configuration
# =============================================================================
database:
  driver: MongoDB
  connection_string: mongodb://localhost:27017/default?retryWrites=false
  # driver: SQLite
  # connection_string: "sqlite::memory:"
  cache: "memcache://memcache:11211"


# =============================================================================
# Authentication Configuration
# =============================================================================
auth:
  strategy: Jwt

  jwt:
    expires_in: 86400  # seconds (24 hours)
    refresh_expires_in: 604800  # seconds (7 days)
  
  # Email & Password Authentication
  email:
   verification:
      required: false
